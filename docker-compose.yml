services:
  api:
    build: .
    image: is-it-toxic
    container_name: is-it-toxic
    ports:
      - "80:8000"        # serve on the droplet's port 80 -> container's 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s   # allow time for the model to load on startup
