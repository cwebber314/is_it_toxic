apiVersion: apps/v1
kind: Deployment
metadata:
  name: is-it-toxic
  labels:
    app: is-it-toxic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: is-it-toxic
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0        # keep old pods until new ones are Ready
      maxSurge: 1
  template:
    metadata:
      labels:
        app: is-it-toxic
    spec:
      containers:
        - name: api
          # Default for manual / initial `kubectl apply`. On each deploy the CI
          # job overrides this to the exact ghcr.io/.../is-it-toxic:<git-sha>
          # via `kubectl set image`, which is what triggers the rolling update.
          image: ghcr.io/cwebber314/is-it-toxic:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "600Mi"
            limits:
              memory: "1500Mi"
          # The model loads once at startup, so give it time before we start
          # health-checking. startupProbe gates the other two probes.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 30    # up to ~150s to become ready
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
