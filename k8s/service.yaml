apiVersion: v1
kind: Service
metadata:
  name: is-it-toxic
  annotations:
    # DigitalOcean provisions a managed Load Balancer for a type=LoadBalancer
    # Service. Give it a friendly name in the DO panel.
    service.beta.kubernetes.io/do-loadbalancer-name: "is-it-toxic-lb"
spec:
  type: LoadBalancer
  selector:
    app: is-it-toxic
  ports:
    - name: http
      port: 80          # external port on the load balancer
      targetPort: http  # -> containerPort 8000
