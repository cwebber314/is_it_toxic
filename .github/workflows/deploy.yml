name: Build and push image

# Build the serving image and push it to the GitHub Container Registry (GHCR)
# on every commit to main.
on:
  push:
    branches: [main]

# If several commits land quickly, only build the latest.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# GITHUB_TOKEN needs write access to publish packages (images) to GHCR.
permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<your-github-username-or-org>/is-it-toxic
  IMAGE: ghcr.io/${{ github.repository_owner }}/is-it-toxic

jobs:
  # Fast API smoke tests (ML layer mocked -- no model/torch needed). Gates the
  # rest of the pipeline: a failure here stops the build and deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: pip install fastapi httpx pytest
      - name: Run tests
        run: pytest -q

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bring the BGE model onto the runner (it's too large to commit, and the
      # Dockerfile COPYs it). The trained logreg.joblib is committed, so it's
      # already present from the checkout.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download BGE model
        run: |
          pip install "huggingface_hub>=0.23"
          python scripts/download_model.py

      # Authenticate to GHCR using the built-in token -- no manually created
      # secret needed. It's scoped to this repo and expires when the job ends.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache layers between runs so the slow PyTorch install is reused.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prune old container
        uses: actions/delete-package-versions@v5
        with:
          package-name: is-it-toxic
          package-type: container
          min-versions-to-keep: 4
          delete-only-untagged-versions: false

  # Roll the freshly built image out to the DOKS cluster.
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # doctl fetches the cluster's kubeconfig so kubectl can reach it.
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Configure kubectl for the cluster
        run: doctl kubernetes cluster kubeconfig save is-it-toxic

      # Point the running Deployment at the exact image we just built. Changing
      # the pod template to the immutable :<sha> is what triggers the rollout.
      - name: Roll out the new image
        run: |
          kubectl set image deployment/is-it-toxic \
            api=${{ env.IMAGE }}:${{ github.sha }}
          kubectl rollout status deployment/is-it-toxic --timeout=180s